<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kolkata LST — Static Heatmap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  body { margin:0; font-family: system-ui, sans-serif; }
  header { padding:18px 22px; border-bottom:1px solid #e6e6e6; }
  header h1 { margin:0 0 4px; font-size:1.25rem; }
  header p { margin:0; color:#555; font-size:.85rem; }
  #map { height: calc(100vh - 139px); }
</style>
</head>
<body>
      <nav style="display:flex;align-items:center;gap:4px;background:#fff;padding:0 24px;border-bottom:1px solid #e5e5e5;font-family:-apple-system,system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
            <span style="color:#1a1a1a;font-weight:600;font-size:14px;padding:16px 14px 16px 0;margin-right:8px;">Kolkata Civic Data</span>
            <a href="/" style="font-size:14px;font-weight:500;padding:16px 14px;text-decoration:none;color:#737373;border-bottom:2px solid transparent;">Air Pollution</a>
            <a href="/lst/" style="font-size:14px;font-weight:500;padding:16px 14px;text-decoration:none;color:#737373;border-bottom:2px solid transparent;">LST Map</a>
            <a href="/lst/static.html" style="font-size:14px;font-weight:500;padding:16px 14px;text-decoration:none;color:#1a1a1a;border-bottom:2px solid #1a1a1a;">LST Heatmap</a>
      </nav>
<header>
  <h1>Kolkata LST — Static Heatmap</h1>
  <p>Median Landsat 8/9 LST overlay, 1 Apr – 1 Jun 2026, on OpenStreetMap</p>
</header>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
  // Kolkata AOI bounds used in the GEE script
  const BOUNDS = [[22.40, 88.20], [22.70, 88.50]];
  const map = L.map('map').fitBounds(BOUNDS);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Save the GEE thumbnail PNG to assets/lst_static.png (or paste the getThumbURL link below)
  const PNG = 'assets/lst_static.png';
  L.imageOverlay(PNG, BOUNDS, {
    opacity: 0.7,
    attribution: 'LST: NASA/USGS Landsat 8/9 via Google Earth Engine'
  }).addTo(map);
</script>
</body>
</html>
