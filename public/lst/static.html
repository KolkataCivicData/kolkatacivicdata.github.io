<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kolkata LST — Static Heatmap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  body { margin:0; font-family: system-ui, sans-serif; }
  header { padding:18px 22px; border-bottom:1px solid #e6e6e6; }
  header h1 { margin:0 0 4px; font-size:1.25rem; }
  header p { margin:0; color:#555; font-size:.85rem; }
  #map { height: calc(100vh - 86px); }
</style>
</head>
<body>
<header>
  <h1>Kolkata LST — Static Heatmap</h1>
  <p>Median Landsat 8/9 LST overlay, 1 Apr – 1 Jun 2026, on OpenStreetMap</p>
</header>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
  // Kolkata AOI bounds used in the GEE script
  const BOUNDS = [[22.40, 88.20], [22.70, 88.50]];
  const map = L.map('map').fitBounds(BOUNDS);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Save the GEE thumbnail PNG to assets/lst_static.png (or paste the getThumbURL link below)
  const PNG = 'assets/lst_static.png';
  L.imageOverlay(PNG, BOUNDS, {
    opacity: 0.7,
    attribution: 'LST: NASA/USGS Landsat 8/9 via Google Earth Engine'
  }).addTo(map);
</script>
</body>
</html>
