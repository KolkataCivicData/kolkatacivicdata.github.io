<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kolkata Land Surface Temperature — Apr–Jun 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root { --ink:#1a1a2e; --accent:#c61700; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color:var(--ink); }
  header { padding:18px 22px; border-bottom:1px solid #e6e6e6; }
  header h1 { margin:0 0 4px; font-size:1.25rem; }
  header p { margin:0; color:#555; font-size:.85rem; }
  #map { height: calc(100vh - 86px); width:100%; }
  .legend { background:#fff; padding:10px 12px; border-radius:8px; box-shadow:0 1px 6px rgba(0,0,0,.3); font-size:.78rem; line-height:1.4; }
  .legend i { display:inline-block; width:16px; height:12px; margin-right:6px; vertical-align:middle; }
  .panel { background:#fff; padding:8px 10px; border-radius:8px; box-shadow:0 1px 6px rgba(0,0,0,.3); font-size:.8rem; }
  .panel label { display:block; margin-bottom:4px; }
  .note { background:#fff8e1; border:1px solid #ffe082; padding:6px 9px; border-radius:6px; font-size:.72rem; margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>Kolkata Land Surface Temperature</h1>
  <p>Landsat 8/9 Collection 2 L2 · 1 Apr – 1 Jun 2026 · rendered on OpenStreetMap</p>
</header>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="assets/map.js"></script>
</body>
</html>
